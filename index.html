<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: #141414;
  font-family: sans-serif;
}

/* 🔥 kompakti rakenne */
.carousel {
  position: relative;
  padding: 10px 10px 60px;
  overflow: hidden;
  height: 100%;
}

/* 🔥 rivi */
.row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 10px 0;
  scroll-behavior: smooth;
}

/* piilota scrollbar */
.row::-webkit-scrollbar {
  display: none;
}

/* 🔥 kortti */
.card {
  flex: 0 0 auto;
  width: clamp(110px, 26vw, 220px);
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

/* kuva */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 🔥 zoom vain desktopissa */
@media (hover: hover) and (pointer: fine) {
  .card:hover {
    transform: scale(1.15);
    z-index: 10;
    transition: transform 0.2s ease;
  }
}

/* 🔥 napit */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 18px;
  padding: 6px 8px;
  cursor: pointer;
  z-index: 20;
}

.btn-left { left: 5px; }
.btn-right { right: 5px; }

/* 🔥 mobiili */
@media (max-width: 600px) {

  .carousel {
    padding-bottom: 70px;
  }

  .card {
    width: clamp(100px, 40vw, 160px);
  }

  .btn {
    font-size: 16px;
  }

}

</style>
</head>

<body>

<div class="carousel">
  <button class="btn btn-left">‹</button>
  <button class="btn btn-right">›</button>

  <div class="row">

    <!-- Kuvat -->
    <div class="card"><img src="https://f4.bcbits.com/img/a0932635373_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2966160115_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a3443131662_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a0126627051_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a1545842779_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/9/4/2/7/942729.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2400986321_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2334861048_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/7/5/3/3/753301.jpg"></div>

  </div>
</div>

<script>

const row = document.querySelector('.row');
const leftBtn = document.querySelector('.btn-left');
const rightBtn = document.querySelector('.btn-right');

let speed = 0;
let targetSpeed = 0;
let autoSpeed = 0.8;

let isHovering = false;
let isTouching = false;

/* 🖱️ hiiri */
row.addEventListener('mousemove', (e) => {
  const rect = row.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  let normalized = (x / width) - 0.5;

  if (Math.abs(normalized) < 0.1) normalized = 0;

  targetSpeed = normalized * 10;
});

row.addEventListener('mouseenter', () => isHovering = true);
row.addEventListener('mouseleave', () => {
  isHovering = false;
  targetSpeed = 0;
});

/* 📱 touch */
let startX = 0;

row.addEventListener('touchstart', (e) => {
  isTouching = true;
  startX = e.touches[0].clientX;
});

row.addEventListener('touchmove', (e) => {
  if (!isTouching) return;

  const x = e.touches[0].clientX;
  const diff = startX - x;

  row.scrollLeft += diff * 0.4;

  startX = x;
});

row.addEventListener('touchend', () => {
  isTouching = false;
});

/* napit */
leftBtn.onclick = () => {
  row.scrollBy({ left: -180, behavior: 'smooth' });
};

rightBtn.onclick = () => {
  row.scrollBy({ left: 180, behavior: 'smooth' });
};

/* animaatio */
function animate() {

  if (!isHovering && !isTouching) {
    speed += (autoSpeed - speed) * 0.02;
  } else if (isHovering) {
    speed += (targetSpeed - speed) * 0.08;
  }

  row.scrollLeft += speed;

  const half = row.scrollWidth / 2;

  if (row.scrollLeft >= half) row.scrollLeft -= half;
  if (row.scrollLeft <= 0) row.scrollLeft += half;

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
