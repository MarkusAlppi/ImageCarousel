<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔥 ESTÄ SCROLL */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #141414;
  font-family: sans-serif;
}

/* 🔥 CONTAINER */
.carousel {
  position: relative;
  padding: 10px 10px 40px;
}

/* 🔥 ROW */
.row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: hidden;
  align-items: center;
  scroll-behavior: smooth;
  padding: 10px 0;
}

.row::-webkit-scrollbar {
  display: none;
}

/* 🔥 CARD (RESPONSIIVINEN) */
.card {
  flex: 0 0 auto;
  width: clamp(120px, 40vw, 260px); /* 🔥 tärkeä fix */
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.25s ease;
  position: relative;
}

/* 🔥 KUVA */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 🔥 HOVER */
.card:hover {
  transform: scale(1.1);
  z-index: 10;
}

/* 🔥 NAPIT */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 24px;
  padding: 8px 12px;
  cursor: pointer;
  z-index: 20;
}

.btn-left { left: 5px; }
.btn-right { right: 5px; }

/* 🔥 MOBIILI */
@media (max-width: 600px) {

  .carousel {
    padding: 5px 5px 20px;
  }

  .card {
    width: clamp(100px, 45vw, 220px);
  }

  .card:hover {
    transform: scale(1.05);
  }

  .btn {
    font-size: 18px;
    padding: 5px 8px;
  }
}

</style>
</head>

<body>

<div class="carousel">
  <button class="btn btn-left">‹</button>
  <button class="btn btn-right">›</button>

  <div class="row">

    <!-- ORIGINAL -->
    <div class="card"><img src="https://f4.bcbits.com/img/a0932635373_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2966160115_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a3443131662_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a0126627051_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a1545842779_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/9/4/2/7/942729.jpg?5204"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2400986321_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2334861048_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/7/5/3/3/753301.jpg?0933"></div>

    <!-- DUPLICATE -->
    <div class="card"><img src="https://f4.bcbits.com/img/a0932635373_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2966160115_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a3443131662_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a0126627051_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a1545842779_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/9/4/2/7/942729.jpg?5204"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2400986321_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2334861048_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/7/5/3/3/753301.jpg?0933"></div>

  </div>
</div>

<script>

const row = document.querySelector('.row');
const leftBtn = document.querySelector('.btn-left');
const rightBtn = document.querySelector('.btn-right');

/* 🔘 BUTTONS */
leftBtn.onclick = () => {
  row.scrollBy({ left: -250, behavior: 'smooth' });
};

rightBtn.onclick = () => {
  row.scrollBy({ left: 250, behavior: 'smooth' });
};

/* 📱 TOUCH SWIPE */
let startX = 0;
let isTouching = false;

row.addEventListener('touchstart', (e) => {
  isTouching = true;
  startX = e.touches[0].clientX;
});

row.addEventListener('touchmove', (e) => {
  if (!isTouching) return;

  const x = e.touches[0].clientX;
  const diff = startX - x;

  row.scrollLeft += diff * 0.5;

  startX = x;
});

row.addEventListener('touchend', () => {
  isTouching = false;
});

</script>

</body>
</html>
