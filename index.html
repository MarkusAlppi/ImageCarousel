<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🔥 EI SCROLLBARIA */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: auto;
}

body {
  background: #080f13;
  font-family: sans-serif;
}

/* 🔥 enemmän tilaa zoomille */
.carousel {
  position: relative;
  padding: 30px 20px 140px;
  overflow: visible;
}

.row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: visible;
  padding: 20px 0;
}

.row::-webkit-scrollbar {
  display: none;
}

/* 🔥 pienemmät ja responsiiviset kortit */
.card {
  flex: 0 0 auto;
  width: clamp(120px, 28vw, 300px);
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: visible;
  transition: transform 0.25s ease;
  position: relative;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 🔥 maltillinen zoom */
.card:hover {
  transform: scale(1.2);
  z-index: 10;
}



/* 🔥 mobiili optimointi */
@media (max-width: 600px) {

  .carousel {
    padding-bottom: 180px; /* 🔥 tärkein mobiilifix */
  }

  .card:hover {
    transform: scale(1.03); /* 🔥 erittäin pieni zoom */
  }


}

</style>
</head>

<script>

const row = document.querySelector('.row');


let speed = 0;
let targetSpeed = 0;
let autoSpeed = 1.2;

let isHovering = false;
let isTouching = false;

/* 🖱️ MOUSE */
row.addEventListener('mousemove', (e) => {
  const rect = row.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  let normalized = (x / width) - 0.5;

  if (Math.abs(normalized) < 0.1) normalized = 0;

  targetSpeed = normalized * 12;
});

row.addEventListener('mouseenter', () => {
  isHovering = true;
});

row.addEventListener('mouseleave', () => {
  isHovering = false;
  targetSpeed = 0;
});

/* 📱 TOUCH */
let startX = 0;

row.addEventListener('touchstart', (e) => {
  isTouching = true;
  startX = e.touches[0].clientX;
});

row.addEventListener('touchmove', (e) => {
  if (!isTouching) return;

  const x = e.touches[0].clientX;
  const diff = startX - x;

  row.scrollLeft += diff * 0.5;

  startX = x;
});

row.addEventListener('touchend', () => {
  isTouching = false;
});



/* 🎬 LOOP */
function animate() {

  if (!isHovering && !isTouching) {
    speed += (autoSpeed - speed) * 0.02;
  } else if (isHovering) {
    speed += (targetSpeed - speed) * 0.08;
  }

  row.scrollLeft += speed;

  const half = row.scrollWidth / 2;

  if (row.scrollLeft >= half) {
    row.scrollLeft -= half;
  }

  if (row.scrollLeft <= 0) {
    row.scrollLeft += half;
  }

  requestAnimationFrame(animate);
}

animate();

</script>
