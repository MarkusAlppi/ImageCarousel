<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Carousel</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #141414;
  font-family: sans-serif;
}

.carousel {
  position: relative;
  padding: 40px 20px 120px;
}

.row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-behavior: smooth;
}

.row::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 auto;
  width: clamp(90px, 22vw, 220px);
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.25s ease;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card:hover {
  transform: scale(1.08);
  z-index: 10;
}

.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 24px;
  padding: 6px 10px;
  cursor: pointer;
}

.btn-left { left: 5px; }
.btn-right { right: 5px; }

@media (max-width: 600px) {
  .card:hover {
    transform: scale(1.03);
  }
}
</style>
</head>

<body>

<div class="carousel">
  <button class="btn btn-left">‹</button>
  <button class="btn btn-right">›</button>

  <div class="row">

    <div class="card"><img src="https://f4.bcbits.com/img/a0932635373_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2966160115_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a3443131662_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a0126627051_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a1545842779_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/9/4/2/7/942729.jpg?5204"></div>

  </div>
</div>

<script>

const row = document.querySelector('.row');
const leftBtn = document.querySelector('.btn-left');
const rightBtn = document.querySelector('.btn-right');

leftBtn.onclick = () => {
  row.scrollBy({ left: -300, behavior: 'smooth' });
};

rightBtn.onclick = () => {
  row.scrollBy({ left: 300, behavior: 'smooth' });
};

</script>

</body>
</html>
