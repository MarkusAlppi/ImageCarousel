<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #141414;
  font-family: sans-serif;
}

.carousel {
  position: relative;
  padding: 15px 20px; /* 🔥 lisätty y-tilaa */
  overflow: visible;
}

.row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  overflow-y: visible; /* 🔥 tärkeä */
  scroll-behavior: auto;
  padding-top: 40px;     /* 🔥 tilaa hoverille */
  padding-bottom: 40px;  /* 🔥 tilaa hoverille */
}

.row::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 auto;
  width: 300px;
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: visible;
  transition: transform 0.3s ease;
  position: relative;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* hover */
.card:hover {
  transform: scale(1.3);
  z-index: 10;
}

/* napit */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 30px;
  padding: 10px 15px;
  cursor: pointer;
  z-index: 20;
}

.btn-left { left: 10px; }
.btn-right { right: 10px; }

</style>
</head>
<body>

<div class="carousel">
  <button class="btn btn-left">‹</button>
  <button class="btn btn-right">›</button>

  <div class="row">
    <!-- ORIGINAL -->
    <div class="card"><img src="https://f4.bcbits.com/img/a0932635373_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2966160115_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a3443131662_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a0126627051_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a1545842779_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/9/4/2/7/942729.jpg?5204"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2400986321_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2334861048_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/7/5/3/3/753301.jpg?0933"></div>

    <!-- DUPLICATE (infinite loop) -->
    <div class="card"><img src="https://f4.bcbits.com/img/a0932635373_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2966160115_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a3443131662_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a0126627051_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a1545842779_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/9/4/2/7/942729.jpg?5204"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2400986321_10.jpg"></div>
    <div class="card"><img src="https://f4.bcbits.com/img/a2334861048_10.jpg"></div>
    <div class="card"><img src="https://www.metal-archives.com/images/7/5/3/3/753301.jpg?0933"></div>
  </div>
</div>

<script>

const row = document.querySelector('.row');
const leftBtn = document.querySelector('.btn-left');
const rightBtn = document.querySelector('.btn-right');

let speed = 0;
let targetSpeed = 0;
let maxSpeed = 20;
let autoSpeed = 2;

let isHovering = false;
let isTouching = false;

// 🖱️ MOUSE CONTROL
row.addEventListener('mousemove', (e) => {
  const rect = row.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  let normalized = (x / width) - 0.5;

  if (Math.abs(normalized) < 0.1) normalized = 0;

  targetSpeed = normalized * maxSpeed;
});

row.addEventListener('mouseenter', () => {
  isHovering = true;
});

row.addEventListener('mouseleave', () => {
  isHovering = false;
  targetSpeed = 0;
});

// 📱 TOUCH SWIPE
let startX = 0;

row.addEventListener('touchstart', (e) => {
  isTouching = true;
  startX = e.touches[0].clientX;
});

row.addEventListener('touchmove', (e) => {
  if (!isTouching) return;

  const x = e.touches[0].clientX;
  const diff = startX - x;

  row.scrollLeft += diff * 0.5;

  startX = x;
});

row.addEventListener('touchend', () => {
  isTouching = false;
});

// 🔘 NAPIT
leftBtn.onclick = () => {
  row.scrollBy({ left: -300, behavior: 'smooth' });
};

rightBtn.onclick = () => {
  row.scrollBy({ left: 300, behavior: 'smooth' });
};

// 🎬 LOOP
function animate() {

  if (!isHovering && !isTouching) {
    speed += (autoSpeed - speed) * 0.02;
  } 
  else if (isHovering) {
    speed += (targetSpeed - speed) * 0.08;
  }

  row.scrollLeft += speed;

  // infinite loop
  const half = row.scrollWidth / 2;

  if (row.scrollLeft >= half) {
    row.scrollLeft -= half;
  }

  if (row.scrollLeft <= 0) {
    row.scrollLeft += half;
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
